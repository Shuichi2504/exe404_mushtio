name: Build and deploy ASP.Net Core app to Azure Web App - MUSHTIO1

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: 8.0.x
  API_PROJECT: src/IoTAgriculture.API/IoTAgriculture.API.csproj
  PUBLISH_DIR: ${{ github.workspace }}/publish

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore IoTAgriculture.sln

      - name: Build
        run: dotnet build IoTAgriculture.sln --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish ${{ env.API_PROJECT }} --configuration Release --no-build --output "${{ env.PUBLISH_DIR }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mushtio1-api
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    runs-on: windows-latest
    needs: build
    environment:
      name: Production
      url: https://mushtio1-a2hcerawcpaqezb3.centralindia-01.azurewebsites.net

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: mushtio1-api
          path: ${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Web App - MUSHTIO1
        uses: azure/webapps-deploy@v3
        with:
          app-name: MUSHTIO1
          slot-name: Production
          package: ${{ env.PUBLISH_DIR }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_MUSHTIO1 }}
